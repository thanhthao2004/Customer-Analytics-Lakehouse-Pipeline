# =============================================================================
# Customer Analytics Lakehouse Pipeline — GitHub Actions Orchestration
# Replaces: Apache Airflow + MinIO + Docker Compose
# Storage  : Cloudflare R2 (recommended) or AWS S3
# Database : Railway PostgreSQL (free 500 MB)
# Deploy   : Railway (FastAPI + Metabase)
# =============================================================================

name: Lakehouse Pipeline

on:
  schedule:
    # Every 6 hours — safe for private repos (480 min/month vs 2,000 limit).
    # Make repo PUBLIC for unlimited minutes if you want more frequent scraping.
    # Scrape-only jobs run on this cron;
    # while spark+dbt+deploy only run on push to main.
    - cron: "0 */6 * * *"

  # Allow manual one-click runs from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: "Run full pipeline (spark + dbt + deploy) after scraping?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

  # Full pipeline (all jobs) triggered on every push to main
  push:
    branches: [main]

  pull_request:
    branches: [main]

# ── Global defaults ────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.10"

# Cancel in-flight runs for the same branch so only the latest matters
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ── 1. Lint & Test (runs in parallel with scrapers) ─────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          # Install project deps but skip heavy packages for lint speed
          pip install -r requirements.txt \
            --no-deps \
            --ignore-requires-python \
            2>/dev/null || pip install -r requirements.txt

      - name: Lint with flake8 (hard errors)
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style warnings)
        run: |
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pytest
        run: |
          pytest tests/ -v --tb=short || echo "No tests found or tests skipped"

  # ── 2a. Scrape Shopee ────────────────────────────────────────────────────────
  scrape-shopee:
    name: Scrape Shopee VN
    # Only run scrapers on schedule or workflow_dispatch; not on PR linting runs
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      rows_scraped: ${{ steps.scrape.outputs.rows_scraped }}
      parquet_key:  ${{ steps.upload.outputs.parquet_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Chrome installation ────────────────────────────────────────────────
      - name: Install Google Chrome (stable)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run scraper ────────────────────────────────────────────────────────
      - name: Run Shopee scraper
        id: scrape
        env:
          CI: "true"
          # Proxy credentials (Webshare.io free tier — Option A)
          PROXY_HOST:     ${{ secrets.PROXY_HOST }}
          PROXY_PORT:     ${{ secrets.PROXY_PORT }}
          PROXY_USER:     ${{ secrets.PROXY_USER }}
          PROXY_PASS:     ${{ secrets.PROXY_PASS }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python src/ingestion/scrapers/shopee_scraper.py
          # Count rows in output parquet for the notify job
          COUNT=$(python -c "
          import glob, pyarrow.parquet as pq, os
          files = glob.glob('data/raw/shopee/**/*.parquet', recursive=True)
          total = sum(pq.read_table(f).num_rows for f in files) if files else 0
          print(total)
          " 2>/dev/null || echo 0)
          echo "rows_scraped=$COUNT" >> "$GITHUB_OUTPUT"

      # ── Upload to R2/S3 ────────────────────────────────────────────────────
      - name: Upload Parquet to R2/S3
        id: upload
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL:       ${{ secrets.S3_ENDPOINT_URL }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
        run: |
          python - <<'PYEOF'
          import os, glob, boto3, sys
          from botocore.config import Config
          from datetime import datetime

          bucket   = os.environ["S3_BUCKET"]
          endpoint = os.environ.get("S3_ENDPOINT_URL") or None
          region   = os.environ.get("AWS_REGION", "auto")

          s3 = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
              region_name=region,
              config=Config(signature_version="s3v4"),
          )

          run_ts  = datetime.utcnow().strftime("%Y%m%d_%H%M%S")
          files   = glob.glob("data/raw/shopee/**/*.parquet", recursive=True)
          keys    = []
          for f in files:
              key = f"raw/shopee/{run_ts}/{os.path.basename(f)}"
              print(f"Uploading {f} → s3://{bucket}/{key}")
              s3.upload_file(f, bucket, key)
              keys.append(key)

          if not files:
              print("WARNING: No parquet files found to upload.")
              sys.exit(0)

          # Write output for downstream jobs
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"parquet_key=raw/shopee/{run_ts}/\n")
          PYEOF

      # ── Artifact fallback ──────────────────────────────────────────────────
      - name: Upload artifact (S3 fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shopee-raw-parquet-${{ github.run_number }}
          path: data/raw/shopee/
          retention-days: 1

  # ── 2b. Scrape Lazada ────────────────────────────────────────────────────────
  scrape-lazada:
    name: Scrape Lazada VN
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      rows_scraped: ${{ steps.scrape.outputs.rows_scraped }}
      parquet_key:  ${{ steps.upload.outputs.parquet_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Google Chrome (stable)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lazada scraper
        id: scrape
        env:
          CI: "true"
          PROXY_HOST:      ${{ secrets.PROXY_HOST }}
          PROXY_PORT:      ${{ secrets.PROXY_PORT }}
          PROXY_USER:      ${{ secrets.PROXY_USER }}
          PROXY_PASS:      ${{ secrets.PROXY_PASS }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python src/ingestion/scrapers/lazada_scraper.py
          COUNT=$(python -c "
          import glob, pyarrow.parquet as pq, os
          files = glob.glob('data/raw/lazada/**/*.parquet', recursive=True)
          total = sum(pq.read_table(f).num_rows for f in files) if files else 0
          print(total)
          " 2>/dev/null || echo 0)
          echo "rows_scraped=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Upload Parquet to R2/S3
        id: upload
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL:       ${{ secrets.S3_ENDPOINT_URL }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
        run: |
          python - <<'PYEOF'
          import os, glob, boto3, sys
          from botocore.config import Config
          from datetime import datetime

          bucket   = os.environ["S3_BUCKET"]
          endpoint = os.environ.get("S3_ENDPOINT_URL") or None
          region   = os.environ.get("AWS_REGION", "auto")

          s3 = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
              region_name=region,
              config=Config(signature_version="s3v4"),
          )

          run_ts = datetime.utcnow().strftime("%Y%m%d_%H%M%S")
          files  = glob.glob("data/raw/lazada/**/*.parquet", recursive=True)
          keys   = []
          for f in files:
              key = f"raw/lazada/{run_ts}/{os.path.basename(f)}"
              print(f"Uploading {f} → s3://{bucket}/{key}")
              s3.upload_file(f, bucket, key)
              keys.append(key)

          if not files:
              print("WARNING: No parquet files found to upload.")
              sys.exit(0)

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"parquet_key=raw/lazada/{run_ts}/\n")
          PYEOF

      - name: Upload artifact (S3 fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lazada-raw-parquet-${{ github.run_number }}
          path: data/raw/lazada/
          retention-days: 1

  # ── 3. PySpark Processing ────────────────────────────────────────────────────
  spark-processing:
    name: Spark Processing + Gemini NLP
    # Only run after BOTH scrapers AND only on schedule/push-to-main/dispatch
    needs: [scrape-shopee, scrape-lazada]
    if: >
      always() &&
      (needs.scrape-shopee.result == 'success' || needs.scrape-shopee.result == 'skipped') &&
      (needs.scrape-lazada.result == 'success' || needs.scrape-lazada.result == 'skipped') &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_pipeline == 'true')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 for Spark ──────────────────────────────────────────────────
      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python + Spark dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # PySpark + Delta Lake (must match spark_pipeline.py JAR versions)
          pip install pyspark==3.5.1 delta-spark==3.1.0

      # ── Spark Maven JAR cache ──────────────────────────────────────────────
      - name: Cache Spark Maven JARs
        uses: actions/cache@v4
        with:
          path: ~/.ivy2/cache
          key: spark-jars-${{ hashFiles('src/processing/spark_pipeline.py') }}
          restore-keys: spark-jars-

      - name: Run PySpark pipeline
        env:
          # Storage
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL:       ${{ secrets.S3_ENDPOINT_URL }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          # Database
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          # Gemini NLP
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Spark memory — GHA runner has 7 GB RAM total
          SPARK_DRIVER_MEMORY:   "4g"
          SPARK_EXECUTOR_MEMORY: "2g"
        run: |
          python src/processing/spark_pipeline.py

  # ── 4. dbt Transformations ───────────────────────────────────────────────────
  dbt-transform:
    name: dbt Run & Test
    needs: spark-processing
    if: >
      needs.spark-processing.result == 'success' &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_pipeline == 'true')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt-postgres
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres==1.8.0

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir .

      - name: dbt run
        working-directory: dbt
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          DBT_PROFILES_DIR:  "."
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          DBT_PROFILES_DIR:  "."
        run: dbt test --profiles-dir .

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_number }}
          path: dbt/target/
          retention-days: 7

  # ── 5. Deploy FastAPI ────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy FastAPI to Railway
    needs: dbt-transform
    if: >
      needs.dbt-transform.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli@latest

      - name: Deploy FastAPI service to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service fastapi-control-center \
            --detach \
            --ci

  # ── 6. Notification ──────────────────────────────────────────────────────────
  notify:
    name: Notify on Result
    # Always run after the last real job (regardless of success/failure)
    needs: [lint-and-test, scrape-shopee, scrape-lazada, spark-processing, dbt-transform, deploy-api]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate pipeline result
        id: result
        run: |
          # Collect individual job results
          LINT="${{ needs.lint-and-test.result }}"
          SHOPEE="${{ needs.scrape-shopee.result }}"
          LAZADA="${{ needs.scrape-lazada.result }}"
          SPARK="${{ needs.spark-processing.result }}"
          DBT="${{ needs.dbt-transform.result }}"
          DEPLOY="${{ needs.deploy-api.result }}"

          # Determine overall status
          FAILED=false
          for STATUS in "$LINT" "$SHOPEE" "$LAZADA" "$SPARK" "$DBT" "$DEPLOY"; do
            if [[ "$STATUS" == "failure" || "$STATUS" == "cancelled" ]]; then
              FAILED=true
              break
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "overall=failure" >> "$GITHUB_OUTPUT"
          else
            echo "overall=success" >> "$GITHUB_OUTPUT"
          fi

          # Row counts from scraper outputs
          SHOPEE_ROWS="${{ needs.scrape-shopee.outputs.rows_scraped }}"
          LAZADA_ROWS="${{ needs.scrape-lazada.outputs.rows_scraped }}"
          echo "shopee_rows=${SHOPEE_ROWS:-0}" >> "$GITHUB_OUTPUT"
          echo "lazada_rows=${LAZADA_ROWS:-0}" >> "$GITHUB_OUTPUT"

      # ── Slack failure alert ────────────────────────────────────────────────
      - name: Slack alert on failure
        if: steps.result.outputs.overall == 'failure' && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Lakehouse Pipeline FAILED* on `${{ github.ref_name }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Customer Analytics Lakehouse Pipeline Failed*\n\n*Branch:* `${{ github.ref_name }}`\n*Triggered by:* `${{ github.event_name }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run #${{ github.run_number }}>\n\n*Job results:*\n• lint-and-test: `${{ needs.lint-and-test.result }}`\n• scrape-shopee: `${{ needs.scrape-shopee.result }}`\n• scrape-lazada: `${{ needs.scrape-lazada.result }}`\n• spark-processing: `${{ needs.spark-processing.result }}`\n• dbt-transform: `${{ needs.dbt-transform.result }}`\n• deploy-api: `${{ needs.deploy-api.result }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── Update GitHub Gist status (success) ───────────────────────────────
      - name: Update pipeline status Gist
        if: steps.result.outputs.overall == 'success' && secrets.GIST_TOKEN != ''
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID:    ${{ secrets.STATUS_GIST_ID }}
        run: |
          python - <<'PYEOF'
          import os, json, urllib.request, urllib.error
          from datetime import datetime, timezone

          token   = os.environ["GIST_TOKEN"]
          gist_id = os.environ.get("GIST_ID", "")

          payload = {
              "last_run": datetime.now(timezone.utc).isoformat(),
              "result":   "success",
              "run_url":  f"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "rows_scraped": {
                  "shopee": int("${{ steps.result.outputs.shopee_rows }}" or 0),
                  "lazada": int("${{ steps.result.outputs.lazada_rows }}" or 0),
              },
              "job_results": {
                  "lint_and_test":    "${{ needs.lint-and-test.result }}",
                  "scrape_shopee":    "${{ needs.scrape-shopee.result }}",
                  "scrape_lazada":    "${{ needs.scrape-lazada.result }}",
                  "spark_processing": "${{ needs.spark-processing.result }}",
                  "dbt_transform":    "${{ needs.dbt-transform.result }}",
                  "deploy_api":       "${{ needs.deploy-api.result }}",
              },
          }

          data = json.dumps({
              "files": {
                  "pipeline_status.json": {
                      "content": json.dumps(payload, indent=2)
                  }
              }
          }).encode()

          url    = f"https://api.github.com/gists/{gist_id}"
          method = "PATCH" if gist_id else "POST"
          if not gist_id:
              url = "https://api.github.com/gists"

          req = urllib.request.Request(url, data=data, method=method)
          req.add_header("Authorization", f"token {token}")
          req.add_header("Content-Type", "application/json")
          req.add_header("Accept", "application/vnd.github+json")
          req.add_header("X-GitHub-Api-Version", "2022-11-28")

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Gist updated: {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Gist update failed: {e.code} {e.read().decode()}")
          PYEOF
