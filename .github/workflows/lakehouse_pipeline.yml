# =============================================================================
# Customer Analytics Lakehouse Pipeline — GitHub Actions Orchestration
# Replaces: Apache Airflow + MinIO + Docker Compose
# Storage  : Cloudflare R2 (zero egress)
# Database : Railway PostgreSQL (500 MB free)
# Deploy   : Railway (FastAPI only — Metabase → Preset.io free cloud)
# Schedule : Daily at 01:00 AM Vietnam time (18:00 UTC)
# Budget   : ~1,260 min/month (public repo = unlimited; private = within 2,000)
# =============================================================================

name: Lakehouse Pipeline

on:
  schedule:
    # 01:00 AM Vietnam time = 18:00 UTC
    # Full run: ~42 min/day × 30 days = 1,260 min/month
    - cron: "0 18 * * *"

  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: "Run full pipeline (spark + dbt + deploy) after scraping?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
jobs:

  # ── 1. Lint & Test ───────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint/test deps
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pyarrow loguru

      - name: Lint — hard errors
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — style warnings
        run: |
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pytest
        run: |
          pytest tests/ -v --tb=short || echo "No tests found — skipping"

  # ── 2. Scrape Shopee ─────────────────────────────────────────────────────────
  scrape-shopee:
    name: Scrape Shopee VN (10 brands × 10 products × 50 reviews)
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      rows_scraped: ${{ steps.scrape.outputs.rows_scraped }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install scraping deps (API-only — no Chrome needed)
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests==2.31.0 \
            pyarrow==15.0.0 \
            boto3==1.34.0 \
            botocore==1.34.0 \
            loguru==0.7.2

      - name: Run Shopee scraper
        id: scrape
        env:
          CI: "true"
          PLATFORM: "shopee"
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL:       ${{ secrets.S3_ENDPOINT_URL }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          PROXY_HOST:            ${{ secrets.PROXY_HOST }}
          PROXY_PORT:            ${{ secrets.PROXY_PORT }}
          PROXY_USER:            ${{ secrets.PROXY_USER }}
          PROXY_PASS:            ${{ secrets.PROXY_PASS }}
        run: |
          python src/ingestion/scrapers/shopee_scraper.py
          # Count output rows
          COUNT=$(python -c "
          import glob, pyarrow.parquet as pq
          files = glob.glob('data/raw/shopee/*.parquet')
          print(sum(pq.read_table(f).num_rows for f in files) if files else 0)
          " 2>/dev/null || echo 0)
          echo "rows_scraped=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Shopee rows scraped: $COUNT"

      - name: Upload artifact (S3 fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shopee-parquet-${{ github.run_number }}
          path: data/raw/shopee/
          retention-days: 1
          if-no-files-found: warn

  # ── 3. Scrape Lazada ─────────────────────────────────────────────────────────
  scrape-lazada:
    name: Scrape Lazada VN (10 brands × 10 products × 50 reviews)
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      rows_scraped: ${{ steps.scrape.outputs.rows_scraped }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install scraping deps (API-only — no Chrome needed)
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests==2.31.0 \
            pyarrow==15.0.0 \
            boto3==1.34.0 \
            botocore==1.34.0 \
            loguru==0.7.2

      - name: Run Lazada scraper
        id: scrape
        env:
          CI: "true"
          PLATFORM: "lazada"
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL:       ${{ secrets.S3_ENDPOINT_URL }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          PROXY_HOST:            ${{ secrets.PROXY_HOST }}
          PROXY_PORT:            ${{ secrets.PROXY_PORT }}
          PROXY_USER:            ${{ secrets.PROXY_USER }}
          PROXY_PASS:            ${{ secrets.PROXY_PASS }}
        run: |
          python src/ingestion/scrapers/lazada_scraper.py
          COUNT=$(python -c "
          import glob, pyarrow.parquet as pq
          files = glob.glob('data/raw/lazada/*.parquet')
          print(sum(pq.read_table(f).num_rows for f in files) if files else 0)
          " 2>/dev/null || echo 0)
          echo "rows_scraped=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Lazada rows scraped: $COUNT"

      - name: Upload artifact (S3 fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lazada-parquet-${{ github.run_number }}
          path: data/raw/lazada/
          retention-days: 1
          if-no-files-found: warn

  # ── 4. Spark Processing ──────────────────────────────────────────────────────
  spark-processing:
    name: Spark + Gemini NLP (incremental mode)
    needs: [scrape-shopee, scrape-lazada]
    # Run if at least ONE scraper succeeded
    if: >
      always() &&
      (needs.scrape-shopee.result == 'success' || needs.scrape-lazada.result == 'success') &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_pipeline == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache Spark Maven JARs
        uses: actions/cache@v4
        with:
          path: ~/.ivy2/cache
          key: spark-jars-${{ hashFiles('src/processing/spark_pipeline.py') }}
          restore-keys: spark-jars-

      - name: Install Spark deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyspark==3.5.1 \
            delta-spark==3.1.0 \
            pyarrow==15.0.0 \
            boto3==1.34.0 \
            botocore==1.34.0 \
            psycopg2-binary==2.9.9 \
            loguru==0.7.2 \
            google-genai==0.8.0

      - name: Run PySpark pipeline (incremental)
        env:
          SPARK_MODE:            "incremental"
          SPARK_DRIVER_MEMORY:   "4g"
          SPARK_EXECUTOR_MEMORY: "2g"
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL:       ${{ secrets.S3_ENDPOINT_URL }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          POSTGRES_HOST:         ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:         ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER:         ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:           ${{ secrets.POSTGRES_DB }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: python src/processing/spark_pipeline.py

  # ── 5. dbt Transform ─────────────────────────────────────────────────────────
  dbt-transform:
    name: dbt Run & Test
    needs: spark-processing
    if: >
      needs.spark-processing.result == 'success' &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_pipeline == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres==1.8.0 dbt-core==1.8.0

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir .

      - name: dbt run
        working-directory: dbt
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT:     ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
        run: dbt test --profiles-dir .

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_number }}
          path: dbt/target/
          retention-days: 7

  # ── 6. Deploy FastAPI ────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy FastAPI → Railway
    needs: dbt-transform
    if: >
      needs.dbt-transform.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service fastapi-api --detach --ci

  # ── 7. Deploy Frontend → GitHub Pages ────────────────────────────────────────
  deploy-frontend:
    name: Deploy Dashboard → GitHub Pages
    needs: [scrape-shopee, scrape-lazada]
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - uses: actions/checkout@v4

      - name: Inject Railway API URL into frontend
        env:
          FASTAPI_URL: ${{ secrets.FASTAPI_URL }}
        run: |
          if [ -n "$FASTAPI_URL" ]; then
            sed -i "s|https://YOUR-FASTAPI-SERVICE.up.railway.app|$FASTAPI_URL|g" \
              frontend/index.html
            echo "API URL injected: $FASTAPI_URL"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./frontend
          publish_branch: gh-pages
          commit_message: "Deploy dashboard [skip ci]"

  # ── 7. Notify ────────────────────────────────────────────────────────────────
  notify:
    name: Notify (Slack + Gist)
    needs: [scrape-shopee, scrape-lazada, spark-processing, dbt-transform]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Evaluate results
        id: result
        run: |
          SHOPEE="${{ needs.scrape-shopee.result }}"
          LAZADA="${{ needs.scrape-lazada.result }}"
          SPARK="${{ needs.spark-processing.result }}"
          DBT="${{ needs.dbt-transform.result }}"

          FAILED=false
          for S in "$SHOPEE" "$LAZADA" "$SPARK" "$DBT"; do
            [[ "$S" == "failure" || "$S" == "cancelled" ]] && FAILED=true && break
          done

          echo "overall=$([ $FAILED == true ] && echo failure || echo success)" >> "$GITHUB_OUTPUT"
          echo "shopee_rows=${{ needs.scrape-shopee.outputs.rows_scraped }}" >> "$GITHUB_OUTPUT"
          echo "lazada_rows=${{ needs.scrape-lazada.outputs.rows_scraped }}" >> "$GITHUB_OUTPUT"

      - name: Slack alert on failure
        if: steps.result.outputs.overall == 'failure' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SHOPEE_R="${{ needs.scrape-shopee.result }}"
          LAZADA_R="${{ needs.scrape-lazada.result }}"
          SPARK_R="${{ needs.spark-processing.result }}"
          DBT_R="${{ needs.dbt-transform.result }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ Lakehouse Pipeline FAILED on \`${{ github.ref_name }}\`\",
              \"blocks\": [{
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"❌ *Lakehouse Pipeline Failed*\n• scrape-shopee: \`$SHOPEE_R\`\n• scrape-lazada: \`$LAZADA_R\`\n• spark-processing: \`$SPARK_R\`\n• dbt-transform: \`$DBT_R\`\n<$RUN_URL|View run #${{ github.run_number }}>\"
                }
              }]
            }"

      - name: Update Gist on success
        if: steps.result.outputs.overall == 'success' && env.GIST_TOKEN != ''
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID:    ${{ secrets.STATUS_GIST_ID }}
        run: |
          SHOPEE_ROWS="${{ steps.result.outputs.shopee_rows }}"
          LAZADA_ROWS="${{ steps.result.outputs.lazada_rows }}"
          TOTAL=$((${SHOPEE_ROWS:-0} + ${LAZADA_ROWS:-0}))
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          PAYLOAD=$(cat <<EOF
          {
            "last_run": "$NOW",
            "result": "success",
            "run_url": "$RUN_URL",
            "rows_scraped": {
              "shopee": ${SHOPEE_ROWS:-0},
              "lazada": ${LAZADA_ROWS:-0},
              "total":  $TOTAL
            },
            "job_results": {
              "scrape_shopee":    "${{ needs.scrape-shopee.result }}",
              "scrape_lazada":    "${{ needs.scrape-lazada.result }}",
              "spark_processing": "${{ needs.spark-processing.result }}",
              "dbt_transform":    "${{ needs.dbt-transform.result }}"
            }
          }
          EOF
          )

          curl -s -X PATCH "https://api.github.com/gists/${GIST_ID}" \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "{\"files\":{\"pipeline_status.json\":{\"content\":$(echo "$PAYLOAD" | python3 -c \"import json,sys; print(json.dumps(sys.stdin.read()))\" )}}}"
